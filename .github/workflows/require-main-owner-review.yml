name: Require main owner review

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - edited

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  require-owner-approval:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify approval from repository owner
        uses: actions/github-script@v7
        with:
          script: |
            const requiredReviewer = 'Relentless-Machine';
            const prAuthor = context.payload.pull_request.user && context.payload.pull_request.user.login;

            if (prAuthor && prAuthor.toLowerCase() === requiredReviewer.toLowerCase()) {
              core.info(`Skipping approval check because @${requiredReviewer} opened the PR.`);
              return;
            }

            const { owner, repo } = context.repo;
            const pullNumber = context.payload.pull_request.number;

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: pullNumber,
              per_page: 100,
            });

            const headSha = context.payload.pull_request.head.sha;

            const approved = reviews.some((review) => {
              return review.state === 'APPROVED'
                && review.commit_id === headSha
                && review.user
                && review.user.login
                && review.user.login.toLowerCase() === requiredReviewer.toLowerCase();
            });

            if (!approved) {
              core.setFailed(`main requires approval from @${requiredReviewer} on the current head commit.`);
            }